name: linux

on:
  push:
    branches: ['*']
    tags-ignore: ['*']
  pull_request:
  
env:
  # test_runner: prove, make-test, matrix 
  test_runner: matrix
  
  OREPAN_VERSION: 0.08
  # DBIC_TRACE: 4
  # DBIC_TRACE_PROFILE: console_monochrome
  
  DEBIAN_FRONTEND: noninteractive

  CPAN_MIRROR: http://www.cpan.org
  VERBOSE: '' # --verbose
     
  
jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
    container:
      image: perl

    steps:
      - uses: actions/checkout@v5
      - name: apt-get update + install 
        run: |
          apt-get update && apt-get install -y carton
      
      # there should be a --deployment here, but we don't have a cpanfile.snapshot, 
      # so instead of installing pinned versions we'll just use whatever's on cpan
      - name: carton install 
        run: carton install
      - name: Run Tests under prove 
        run: carton exec -- prove --merge --verbose  t/
        


